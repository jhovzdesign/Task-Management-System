<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#312e81,#0891b2);
    color:white;
    padding:15px;
}

.glass{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.15);
}

.container{
    display:grid;
    grid-template-columns:250px 1fr;
    gap:15px;
}

.sidebar{
    border-radius:20px;
    padding:20px;
}

.logo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.menu button{
    width:100%;
    margin-bottom:10px;
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:rgba(255,255,255,.08);
    color:white;
}

.menu button:hover{
    background:rgba(255,255,255,.15);
}

.main{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.topbar{
    border-radius:20px;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.addBtn{
    padding:10px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.column{
    border-radius:20px;
    padding:15px;
    min-height:400px;
}

.task{
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    cursor:pointer;
    background:rgba(255,255,255,.08);
}

.task:hover{
    transform:translateY(-2px);
}

@media(max-width:900px){

    .container{
        grid-template-columns:1fr;
    }

    .board{
        grid-template-columns:1fr;
    }

    .topbar{
        flex-direction:column;
        gap:10px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="sidebar glass">
        <div class="logo">✨ TaskFlow</div>

        <div class="menu">
            <button onclick="showPage('Dashboard')">Dashboard</button>
            <button onclick="showPage('Tasks')">Tasks</button>
            <button onclick="showPage('Projects')">Projects</button>
            <button onclick="showPage('Reports')">Reports</button>
        </div>
    </div>

    <div class="main">

        <div class="topbar glass">
            <h2 id="pageTitle">Dashboard</h2>
            <button class="addBtn" onclick="addTask()">+ Add Task</button>
        </div>

        <div class="board">

            <div class="column glass">
                <h3>To Do</h3>
                <div id="todo"></div>
            </div>

            <div class="column glass">
                <h3>In Progress</h3>
                <div id="progress"></div>
            </div>

            <div class="column glass">
                <h3>Completed</h3>
                <div id="done"></div>
            </div>

        </div>

    </div>

</div>

<script>

const tasks = [
    {title:"Create Database"},
    {title:"Design UI"}
];

function renderTasks(){

    const todo = document.getElementById("todo");
    todo.innerHTML = "";

    tasks.forEach((task,index)=>{

        const div = document.createElement("div");
        div.className = "task";

        div.innerHTML = task.title;

        div.onclick = ()=>{
            alert("Task Selected: " + task.title);
        };

        todo.appendChild(div);
    });
}

function addTask(){

    const taskName = prompt("Enter Task Name");

    if(taskName){
        tasks.push({title:taskName});
        renderTasks();
    }
}

function showPage(page){

    document.getElementById("pageTitle").innerText = page;

    alert(page + " clicked");
}

renderTasks();

</script>

</body>
</html>
